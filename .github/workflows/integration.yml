name: Integration Tests

# Pin third-party actions to full commit SHAs for supply-chain security.
# GitHub-owned actions (actions/*) may use version tags.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    if: github.repository == 'terok-ai/terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
        with:
          version: "2.4.1"
          virtualenvs-create: true
          virtualenvs-in-project: true
          plugins: poetry-dynamic-versioning[plugin]

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-integration-${{ hashFiles('**/pyproject.toml', '**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with test --no-interaction

      - name: Install nftables and Podman
        run: sudo apt-get update && sudo apt-get install -y nftables podman

      - name: Run integration tests
        run: make test-integration

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5
        with:
          files: ./reports/integration.junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
