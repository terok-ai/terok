# Releases are created via Actions → Release → Run workflow.
# Do not use the "New release" page — v* tags are protected by a repository
# ruleset that only allows the release GitHub App to create them.

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.5.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version '$RELEASE_VERSION' — expected N.N.N" >&2
            exit 1
          fi

      - name: Install dynamic versioning plugin
        run: poetry self add "poetry-dynamic-versioning[plugin]"

      - name: Bump version in pyproject.toml
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: poetry version "$RELEASE_VERSION"

      - name: Commit version bump
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "release: v$RELEASE_VERSION"

      - name: Create tag
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: git tag "v$RELEASE_VERSION"

      - name: Push commit and tag
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: git push origin HEAD "v$RELEASE_VERSION"

      - name: Cache virtualenv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.12-release-${{ hashFiles('**/pyproject.toml') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction

      - name: Build distributions
        run: poetry build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          generate_release_notes: true
          files: dist/*
