name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  reuse:
    if: github.repository == 'terok-ai/terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: REUSE compliance check
        uses: fsfe/reuse-action@v6

  lint:
    if: github.repository == 'terok-ai/terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          args: check

      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check

  boundary-check:
    if: github.repository == 'terok-ai/terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tach
        run: pip install -r .github/requirements-ci.txt

      - name: Check module boundaries
        run: tach check

  docstring-coverage:
    if: github.repository == 'terok-ai/terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install docstr-coverage
        run: pip install -r .github/requirements-ci.txt

      - name: Check docstring coverage
        run: docstr-coverage src/terok/ --fail-under=95

  dead-code:
    if: github.repository == 'terok-ai/terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install vulture
        run: pip install -r .github/requirements-ci.txt

      - name: Check for dead code
        run: vulture src/terok/ vulture_whitelist.py --min-confidence 80

  integration-tests-host:
    name: Integration tests (host)
    if: github.repository == 'terok-ai/terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dynamic versioning plugin
        run: poetry self add "poetry-dynamic-versioning[plugin]"

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-test-${{ hashFiles('**/pyproject.toml', '**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with test --no-interaction

      - name: Run host-only integration tests
        run: make test-integration-host

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: ./reports/integration-host.junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
