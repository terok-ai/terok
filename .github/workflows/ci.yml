# Pin third-party actions to full commit SHAs for supply-chain security.
# GitHub-owned actions (actions/*) may use version tags.
#
# The static-check battery lives in terok-util's fleet-checks.yml
# (reusable across the package family); only the repo-specific
# import-linter and host-integration jobs stay local.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  checks:
    uses: terok-ai/terok-util/.github/workflows/fleet-checks.yml@v0.3.0a3
    with:
      run-lint-imports: true

  integration-tests-host:
    name: Integration tests (host)
    if: github.repository == 'terok-ai/terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run host-only integration tests
        run: make test-integration-host

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5
        with:
          files: ./reports/integration-host.junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
